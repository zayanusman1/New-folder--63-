<!DOCTYPE html>
<html lang="en">

<body>
    <p>Finding the max number with the help of argument objects</p>
    <p id="result"></p>
    <script>
        function findMax() {
            var i;
            var max = 0;
            for (i = 0; i < arguments.length; i++) {
                if (arguments[i] > max) {
                    max = arguments[i];
                }
            }
            return max;
        }

        document.getElementById("result").innerHTML = findMax(21, 10, 19, 12);
    </script>
</body>

</html>

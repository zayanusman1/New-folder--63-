<!DOCTYPE html>
<html>
    <body>
        <h2>Object Properties</h2>
        <p> There are 2 different ways of accessing an object property</p>
        <p id="demo"></p>
        <script>
            // Create an object:
            var person = {firstname:"george",
                age: 20,
            };
            // Display data from the object:
            document.getElementById("demo").innerHTML =
                person.firstname + " is " + person.age + " years old.";
        </script>
    </body>
</html>
